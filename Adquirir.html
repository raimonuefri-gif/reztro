<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adquirir</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #d41e1e, #942626);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;

        }


        center {
            width: 100%;
        }

        article {
            width: 500px;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.2);

        }

        .logo {
            text-align: left;
            font-size: 30px;

        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: rgb(0, 0, 0);
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }

        fieldset {
            border: 2px solid #a51a1a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;


        }


        legend {
            padding: 5px 15px;
            background-color: #a71d1d;
            color: white;
            border-radius: 20px;
            font-weight: bold;


        }

        table {
            width: 100%;
        }

        td {
            padding: 8px;
        }

        input {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #aa1919;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: rgb(156, 26, 26);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: rgb(163, 19, 19);
            transform: scale(1.05);
        }

        #Volver {
            display: block;
            margin-right: 500px;
            width: 80px;
        }

        .Beneficios {
            text-align: center;
        }

        #splash {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: #c51616;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }

        .splash-logo {
            width: 200px;
            animation: zoomIn 1.5s ease;
        }

        @keyframes zoomIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        #contenido {
            display: none;
        }

        .logo-central {
            display: block;
            margin: 50px auto;
            width: 180px;

        }

        html,
        body {
            margin: 0%;
            padding: 0;
            height: 100%;
        }
    </style>

</head>

<body>


    <div id="splash">
        <img src="Reztro (3).png" alt="Reztro Logo" class="splash-logo">
    </div>



    <center>
        <section>
            <article>
                <button id="Volver">Volver</button>
                <img src="Reztro.png" width="200" height="200">
                <h1>!Estas apunto de que tu restaurante funcione solo!</h1>
                <div class="Beneficios">
                    <p><b>✔Activacion inmediata</b></p>
                    <p><b>✔Soporte 24/7</b></p>
                    <p><b>✔Sin contratos ocultos</b></h1>
                    </p>
                </div>

                <fieldset>
                    <legend>Datos Personales</legend>
                    <form action="" name="" method="post">
                        <table border="0" align="center">
                            <tr>
                                <td>
                                    <b>Nombre y Apellido:</b>
                                </td>
                                <td>
                                    <label for="name"></label>
                                    <input type="text" name="nombre" id="nombre" required>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <b>Tarjeta:</b>
                                </td>
                                <td>
                                    <label for="tarjeta"></label>
                                    <input type="number" name="tarjeta" id="tarjeta" required />
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <b>CVV:</b>
                                </td>
                                <td>
                                    <label for="CVV"></label>
                                    <input type="password" name="CVV" id="CVV" max="3" required>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <b>Fecha de vencimiento:</b>
                                </td>
                                <td>
                                    <label for="vencimiento"></label>
                                    <input type="date" name="vencimiento" id="vencimiento" required>
                                </td>
                            </tr>
                        </table>
                </fieldset>
                <br><br>

                <fieldset>
                    <legend>Datos del Restaurante</legend>
                    <table border="0" align="center">
                        <tr>
                            <td>
                                <b>Nombre del Restaurante:</b>
                            </td>
                            <td>
                                <label for="name"></label>
                                <input type="text" name="Restaurante" id="Restaurante" required>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <b>Nombre del Gerente:</b>
                            </td>
                            <td>
                                <label for="Gerente"></label>
                                <input type="text" name="Gerente" id="Gerente" required />
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <b>Telefono del Restaurante:</b>
                            </td>
                            <td>
                                <label for="Telefono"></label>
                                <input type="number" name="Telefono" id="Telefono" max="11" required>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <b>Direccion:</b>
                            </td>
                            <td>
                                <label for="Direccion"></label>
                                <input type="text" name="Direccion" id="Direccion" required>
                            </td>
                        </tr>

                    </table>
                </fieldset>
                <br>

                <script>

                    window.addEventListener("load", function () {
                        setTimeout(function () {
                            const splash = document.getElementById("splash");
                            splash.style.opacity = "0";

                            setTimeout(function () {
                                splash.style.display = "none";
                                document.getElementById("contenido").style.display = "block";
                            }, 1000);
                        }, 2000);
                    });
                </script>
                <button>Enviar Datos</button><br><br>
                <button id="Volver">Volver</button>
            </article>
        </section>
</body>
</center>

</html>
